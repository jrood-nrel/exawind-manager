packages:
  cray-mpich:
    require: "@=8.1.28"
    buildable: false
    externals:
      - spec: "cray-mpich@=8.1.28%intel@2023.2.0"
        prefix: /opt/cray/pe/mpich/8.1.28/ofi/intel/2022.1
        modules:
          - libfabric/1.15.2.0
      - spec: "cray-mpich@=8.1.28%gcc@12.1.0"
        prefix: /opt/cray/pe/mpich/8.1.28/ofi/gnu/10.3
        modules:
          - libfabric/1.15.2.0
  boost:
    require: "@=1.80.0"
  mpi:
    require: "cray-mpich@8.1.28%intel"
  blas:
    require: "netlib-lapack"
  lapack:
    require: "netlib-lapack"
  python:
    require: "%gcc"
  netlib-scalapack:
    require: "~shared+pic%intel"
  netlib-lapack:
    require: "~shared+pic%intel"
  diffutils:
    require: "%gcc"
  tar:
    require: "%gcc"
  binutils:
    require: "%gcc"
  gettext:
    require: "%gcc"
  findutils:
    require: "%gcc"
  all:
    prefer:
      - "%intel"
      - "build_type=Release"
